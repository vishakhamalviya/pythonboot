<h2>Case Details</h2>

<table border="1">
    <tr>
        <th>Case ID</th>
        <td>{{ case.id }}</td>
    </tr>

    <tr>
        <th>Case Name</th>
        <td>{{ case.case_name }}</td>
    </tr>

    <tr>
        <th>Case Type</th>
        <td>{{ case.case_type }}</td>
    </tr>

    <tr>
        <th>Status</th>
        <td>{{ case.status }}</td>
    </tr>

    <tr>
        <th>Created Date</th>
        <td>{{ case.created_at }}</td>
    </tr>
</table>

{% for evidence in case.evidences.all %}
    <a href="{{ evidence.file_path.url }}" target="_blank">
        {{ evidence.file_name }}
    </a>
    <br>
{% endfor %}
